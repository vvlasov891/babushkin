<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>itoito - Media Player</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #4A4D4A;
            margin: 0;
            padding: 50px 20px;
        }
        .media-container {
            background: rgba(30, 32, 30, 0.85);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: inline-block;
        }
        .photo {
            max-width: 300px;
            border-radius: 10px;
            display: block;
            margin: 0 auto 20px auto;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }
        
        /* Название текущего трека */
        .track-title {
            color: #ff9800;
            font-weight: bold;
            font-size: 0.95rem;
            margin-bottom: 15px;
            width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: uppercase;
        }

        /* Панель управления */
        .custom-player {
            width: 300px;
            margin: 0 auto;
            background: #252825;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #ff9800;
            box-sizing: border-box;
        }
        
        /* Кнопки управления */
        .nav-btn, .play-btn {
            background: #ff9800;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            border-radius: 50%;
            flex-shrink: 0;
            padding: 0;
        }
        .play-btn {
            width: 40px;
            height: 40px;
            font-size: 1rem;
        }
        .nav-btn {
            width: 30px;
            height: 30px;
            font-size: 0.8rem;
            background: #444;
        }
        .play-btn:hover { background: #e68a00; }
        .nav-btn:hover { background: #ff9800; }
        
        .progress-container {
            flex-grow: 1;
            background: #444;
            height: 6px;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }
        .progress-bar {
            background: #ff9800;
            width: 0%;
            height: 100%;
            border-radius: 3px;
        }
        .time-display {
            color: #aaa;
            font-size: 0.75rem;
            font-family: monospace;
            flex-shrink: 0;
            min-width: 35px;
            text-align: right;
        }
    </style>
</head>
<body>

    <!-- Тег аудио без жестко прописанного трека (будет меняться через JS) -->
    <audio id="audio-track" preload="auto"></audio>

    <div class="media-container">
        <img class="photo" src="icon.jpg" alt="Фото">
        
        <!-- Блок с названием песни -->
        <div class="track-title" id="track-name">Загрузка...</div>
        
        <div class="custom-player">
            <button class="nav-btn" id="prev-btn">◀◀</button>
            <button class="play-btn" id="play-pause-btn">▶</button>
            <button class="nav-btn" id="next-btn">▶▶</button>
            
            <div class="progress-container" id="progress-timeline">
                <div class="progress-bar" id="progress-fill"></div>
            </div>
            <div class="time-display" id="time-show">0:00</div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('audio-track');
        const playBtn = document.getElementById('play-pause-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const progressContainer = document.getElementById('progress-timeline');
        const progressFill = document.getElementById('progress-fill');
        const timeShow = document.getElementById('time-show');
        const trackName = document.getElementById('track-name');

        // Список треков для воспроизведения
        const playlist = [
            { name: "Sector Sweep", file: "BAILEY_-_Sector_Sweep_-_Half-life_2_Orange_Box_Episode_12_Portal_Team_fortress_2_2007_OST_64228539.mp3" },
            { name: "Apprehension and Evasion", file: "12_Apprehension_and_Evasion.mp3" },
            { name: "Diabolical Adrenaline Guitar", file: "Diabolical_Adrenaline_Guitar.mp3" }
        ];

        let currentTrackIndex = 0;

        // Функция загрузки трека по индексу
        function loadTrack(index) {
            const track = playlist[index];
            audio.src = track.file;
            trackName.innerText = track.name;
            progressFill.style.width = '0%';
            timeShow.innerText = "0:00";
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return mins + ":" + (secs < 10 ? "0" : "") + secs;
        }

        // Кнопка Play/Pause
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().catch(err => console.log("Файл загружается..."));
                playBtn.innerText = '❚❚';
            } else {
                audio.pause();
                playBtn.innerText = '▶';
            }
        });

        // Переключение НАЗАД
        prevBtn.addEventListener('click', () => {
            currentTrackIndex--;
            if (currentTrackIndex < 0) currentTrackIndex = playlist.length - 1; // переход к концу
            loadTrack(currentTrackIndex);
            audio.play().catch(err => console.log("Буферизация..."));
            playBtn.innerText = '❚❚';
        });

        // Переключение ВПЕРЕД
        nextBtn.addEventListener('click', () => {
            currentTrackIndex++;
            if (currentTrackIndex >= playlist.length) currentTrackIndex = 0; // переход к началу
            loadTrack(currentTrackIndex);
            audio.play().catch(err => console.log("Буферизация..."));
            playBtn.innerText = '❚❚';
        });

        // Ожидание медленного интернета
        audio.addEventListener('waiting', () => { playBtn.innerText = '⏳'; });
        audio.addEventListener('playing', () => { playBtn.innerText = '❚❚'; });

        // Полоса прогресса
        audio.addEventListener('timeupdate', () => {
            if (audio.duration && isFinite(audio.duration)) {
                const percentage = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = percentage + '%';
                timeShow.innerText = formatTime(audio.currentTime);
            }
        });

        // Перемотка кликом
        progressContainer.addEventListener('click', (e) => {
            if (audio.duration && isFinite(audio.duration) && audio.duration > 0) {
                const width = progressContainer.clientWidth;
                const clickX = e.offsetX;
                const targetTime = (clickX / width) * audio.duration;
                if (!isNaN(targetTime) && isFinite(targetTime)) {
                    audio.currentTime = targetTime;
                }
            }
        });

        // Когда трек заканчивается, автоматически включается следующий
        audio.addEventListener('ended', () => {
            nextBtn.click();
        });
        
        audio.addEventListener('loadedmetadata', () => {
            timeShow.innerText = formatTime(audio.duration);
        });

        // Инициализация первого трека при заходе на страницу
        loadTrack(currentTrackIndex);
    </script>
</body>
</html>
