<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>И то И то</title>
    <!-- Относительный путь к иконке вкладки -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #4A4D4A;
            margin: 0;
            padding: 50px 20px;
        }
        .media-container {
            background: rgba(30, 32, 30, 0.85);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: inline-block;
        }
        .photo {
            max-width: 300px;
            border-radius: 10px;
            display: block;
            margin: 0 auto 25px auto;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        /* Стили кастомного плеера */
        .custom-player {
            width: 300px;
            margin: 0 auto;
            background: #252825;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #ff9800;
            box-sizing: border-box;
        }
        .play-btn {
            background: #ff9800;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
            padding: 0;
        }
        .play-btn:hover { background: #e68a00; }
        
        .progress-container {
            flex-grow: 1;
            background: #444;
            height: 6px;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }
        .progress-bar {
            background: #ff9800;
            width: 0%;
            height: 100%;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <!-- Тег аудио с принудительным предзагрузкой файла (preload="auto") -->
    <audio id="audio-track" preload="auto">
        <source src="BAILEY_-_Sector_Sweep_-_Half-life_2_Orange_Box_Episode_12_Portal_Team_fortress_2_2007_OST_64228539.mp3" type="audio/mpeg">
    </audio>

    <div class="media-container">
        <img class="photo" src="icon.jpg" alt="Фото">
        
        <!-- Наш собственный красивый плеер -->
        <div class="custom-player">
            <button class="play-btn" id="play-pause-btn">▶</button>
            <div class="progress-container" id="progress-timeline">
                <div class="progress-bar" id="progress-fill"></div>
            </div>
        </div>
    </div>

    <!-- Управление кастомным плеером -->
    <script>
        const audio = document.getElementById('audio-track');
        const playBtn = document.getElementById('play-pause-btn');
        const progressContainer = document.getElementById('progress-timeline');
        const progressFill = document.getElementById('progress-fill');

        // Переключение Play / Pause с проверкой загрузки
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().then(() => {
                    playBtn.innerText = '❚❚'; // Успешно запустилось — ставим паузу
                }).catch(error => {
                    console.log("Файл еще загружается сервером:", error);
                });
            } else {
                audio.pause();
                playBtn.innerText = '▶'; // Поставили на паузу — возвращаем иконку играть
            }
        });

        // Обновление полосы прогресса (только если файл отдает свою длительность)
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const percentage = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = percentage + '%';
            }
        });

        // Перемотка трека кликом по полосе прогресса с защитой от пустой длины
        progressContainer.addEventListener('click', (e) => {
            if (audio.duration) {
                const width = progressContainer.clientWidth;
                const clickX = e.offsetX;
                const duration = audio.duration;
                audio.currentTime = (clickX / width) * duration;
            }
        });

        // Если трек доиграл до самого конца, возвращаем кнопку в режим готовности к старту
        audio.addEventListener('ended', () => {
            playBtn.innerText = '▶';
            progressFill.style.width = '0%';
        });
    </script>
</body>
</html>
