<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>itoito - Media Player</title>
    <!-- Относительный путь к иконке вкладки -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #4A4D4A; /* Тот самый темно-серый цвет фона */
            margin: 0;
            padding: 50px 20px;
        }
        .media-container {
            /* Темная полупрозрачная карточка в стиле Steam */
            background: rgba(30, 32, 30, 0.7);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: inline-block;
            backdrop-filter: blur(4px); /* Легкое размытие заднего плана */
        }
        .photo {
            max-width: 300px;
            border-radius: 10px;
            display: block;
            margin: 0 auto 25px auto;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }
        audio {
            width: 300px;
            max-width: 100%;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div class="media-container">
        <!-- Картинка загружается напрямую из репозитория -->
        <img class="photo" src="icon.jpg" alt="Фото">
        
        <!-- Аудио загружается напрямую из репозитория -->
        <audio controls>
            <source src="BAILEY_-_Sector_Sweep_-_Half-life_2_Orange_Box_Episode_12_Portal_Team_fortress_2_2007_OST_64228539.mp3" type="audio/mpeg">
            Ваш браузер не поддерживает аудиоэлемент.
        </audio>
    </div>

</body>
</html>
